<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GMUH 2026 – Disponibilidade</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(160deg, #0d1b3e 0%, #1a3a6e 60%, #0d1b3e 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px 40px;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      padding: 32px 24px;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .header .emblem {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #1a3a6e, #0d1b3e);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 32px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 800;
      color: #0d1b3e;
      letter-spacing: -0.3px;
    }
    .header p {
      color: #888;
      font-size: 14px;
      margin-top: 4px;
    }

    .field { margin-bottom: 22px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .select-wrapper {
      position: relative;
    }
    .select-wrapper::after {
      content: '▾';
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      pointer-events: none;
    }
    select, input[type="date"] {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #ebebeb;
      border-radius: 12px;
      font-size: 16px;
      color: #222;
      background: #fafafa;
      appearance: none;
      -webkit-appearance: none;
      transition: border-color 0.2s, background 0.2s;
      cursor: pointer;
    }
    select:focus, input[type="date"]:focus {
      outline: none;
      border-color: #1a3a6e;
      background: #fff;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 42px;
      align-items: center;
      padding: 10px 14px;
      background: #fafafa;
      border: 2px solid #ebebeb;
      border-radius: 12px;
    }
    .tag {
      padding: 5px 13px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
    }
    .tag-violao   { background: #d4edda; color: #155724; }
    .tag-teclado  { background: #cce5ff; color: #004085; }
    .tag-baixo    { background: #ffe5cc; color: #6d3400; }
    .tag-guitarra { background: #ffd6d6; color: #6b0000; }
    .tag-bateria  { background: #e8d5ff; color: #3d007a; }
    .tag-default  { background: #e9ecef; color: #495057; }
    .tag-placeholder { color: #bbb; font-size: 14px; }

    .period-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }
    .period-btn {
      padding: 14px 6px;
      border: 2px solid #ebebeb;
      border-radius: 14px;
      background: #fafafa;
      cursor: pointer;
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: #666;
      transition: all 0.15s;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .period-btn .icon {
      font-size: 26px;
      display: block;
      margin-bottom: 6px;
    }
    .period-btn:hover { border-color: #1a3a6e; color: #1a3a6e; }
    .period-btn.selected {
      border-color: #1a3a6e;
      background: #1a3a6e;
      color: #fff;
    }

    .btn-submit {
      width: 100%;
      padding: 17px;
      background: #1a3a6e;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.2px;
    }
    .btn-submit:hover:not(:disabled) { background: #0d2455; transform: translateY(-1px); }
    .btn-submit:active:not(:disabled) { transform: translateY(0); }
    .btn-submit:disabled { background: #c5c5c5; cursor: not-allowed; }

    .error-box {
      background: #fff0f0;
      color: #c0392b;
      border: 1px solid #f5c6cb;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 18px;
      display: none;
    }

    /* ── Tela de sucesso ── */
    .success { display: none; text-align: center; }
    .success .check-icon { font-size: 72px; margin-bottom: 16px; }
    .success h2 {
      font-size: 22px;
      font-weight: 800;
      color: #0d1b3e;
      margin-bottom: 10px;
    }
    .success .msg {
      color: #555;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 28px;
      background: #f0f4ff;
      border-radius: 12px;
      padding: 16px;
    }

    .btn-whatsapp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 24px;
      background: #25D366;
      color: #fff;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 800;
      text-decoration: none;
      margin-bottom: 14px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-whatsapp:hover { background: #1ebe5d; transform: translateY(-1px); }

    .btn-novo {
      background: none;
      border: 2px solid #ddd;
      border-radius: 14px;
      padding: 13px 24px;
      color: #555;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-novo:hover { border-color: #1a3a6e; color: #1a3a6e; }

    /* spinner */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">

  <!-- Cabeçalho -->
  <div class="header">
    <div class="emblem">🎵</div>
    <h1>GMUH 2026</h1>
    <p>Informe sua disponibilidade</p>
  </div>

  <!-- Formulário -->
  <div id="form-section">
    <div id="error-box" class="error-box"></div>

    <div class="field">
      <label>Seu Nome</label>
      <div class="select-wrapper">
        <select id="musician-select">
          <option value="">Carregando músicos…</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>Instrumento(s)</label>
      <div class="tags" id="tags">
        <span class="tag-placeholder">Selecione seu nome acima</span>
      </div>
    </div>

    <div class="field">
      <label>Data de Disponibilidade</label>
      <input type="date" id="date-input">
    </div>

    <div class="field">
      <label>Período</label>
      <div class="period-grid">
        <div class="period-btn" data-period="Manhã" onclick="selectPeriod(this)">
          <span class="icon">🌅</span>Manhã
        </div>
        <div class="period-btn" data-period="Tarde" onclick="selectPeriod(this)">
          <span class="icon">☀️</span>Tarde
        </div>
        <div class="period-btn" data-period="Noite" onclick="selectPeriod(this)">
          <span class="icon">🌙</span>Noite
        </div>
      </div>
    </div>

    <button class="btn-submit" id="btn-submit" onclick="submitForm()" disabled>
      Confirmar Disponibilidade
    </button>
  </div>

  <!-- Tela de sucesso -->
  <div id="success-section" class="success">
    <div class="check-icon">✅</div>
    <h2>Confirmado!</h2>
    <p class="msg" id="success-msg"></p>
    <a id="whatsapp-btn" class="btn-whatsapp" href="#" target="_blank" style="display:none;">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
      </svg>
      Entrar no Grupo do WhatsApp
    </a>
    <button class="btn-novo" onclick="resetForm()">Registrar outra disponibilidade</button>
  </div>

</div>

<script>
  let musicians = [];
  let selectedMusician = null;
  let selectedPeriod = '';

  // Data mínima = hoje
  const todayStr = new Date().toLocaleDateString('en-CA'); // YYYY-MM-DD local
  const dateInput = document.getElementById('date-input');
  dateInput.min = todayStr;
  dateInput.value = todayStr;
  dateInput.addEventListener('change', validate);

  // Carrega músicos da API
  async function loadMusicians() {
    try {
      const res = await fetch('/api/musicians');
      if (!res.ok) throw new Error();
      musicians = await res.json();

      const sel = document.getElementById('musician-select');
      sel.innerHTML = '<option value="">Selecione seu nome…</option>';
      musicians.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.name;
        opt.textContent = m.name;
        sel.appendChild(opt);
      });
    } catch {
      showError('Não foi possível carregar a lista de músicos. Verifique a conexão.');
    }
  }

  document.getElementById('musician-select').addEventListener('change', function () {
    selectedMusician = musicians.find(m => m.name === this.value) || null;
    renderTags();
    validate();
  });

  const tagClass = {
    'Violão': 'tag-violao',
    'Teclado': 'tag-teclado',
    'Baixo': 'tag-baixo',
    'Guitarra': 'tag-guitarra',
    'Bateria': 'tag-bateria',
  };

  function renderTags() {
    const container = document.getElementById('tags');
    if (!selectedMusician || selectedMusician.instruments.length === 0) {
      container.innerHTML = '<span class="tag-placeholder">Selecione seu nome acima</span>';
      return;
    }
    container.innerHTML = selectedMusician.instruments
      .map(i => `<span class="tag ${tagClass[i] || 'tag-default'}">${i}</span>`)
      .join('');
  }

  function selectPeriod(el) {
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedPeriod = el.dataset.period;
    validate();
  }

  function validate() {
    const ok = selectedMusician && selectedPeriod && dateInput.value;
    document.getElementById('btn-submit').disabled = !ok;
  }

  function showError(msg) {
    const box = document.getElementById('error-box');
    box.textContent = msg;
    box.style.display = 'block';
  }

  async function submitForm() {
    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Enviando…';
    document.getElementById('error-box').style.display = 'none';

    try {
      const res = await fetch('/api/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          pageIds: selectedMusician.pageIds,
          date: dateInput.value,
          period: selectedPeriod,
        }),
      });
      const data = await res.json();

      if (data.success) {
        showSuccess(dateInput.value, data.whatsappLink);
      } else {
        showError(data.error || 'Erro ao salvar. Tente novamente.');
        btn.disabled = false;
        btn.textContent = 'Confirmar Disponibilidade';
      }
    } catch {
      showError('Erro de conexão. Verifique sua internet e tente novamente.');
      btn.disabled = false;
      btn.textContent = 'Confirmar Disponibilidade';
    }
  }

  function showSuccess(date, whatsappLink) {
    document.getElementById('form-section').style.display = 'none';
    document.getElementById('success-section').style.display = 'block';

    const dateFormatted = new Date(date + 'T12:00:00').toLocaleDateString('pt-BR', {
      weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
    });

    const periodIcons = { 'Manhã': '🌅', 'Tarde': '☀️', 'Noite': '🌙' };
    document.getElementById('success-msg').innerHTML =
      `<strong>${selectedMusician.name}</strong> está disponível<br>` +
      `${periodIcons[selectedPeriod] || ''} <strong>${selectedPeriod}</strong> · ${dateFormatted}`;

    const waBtn = document.getElementById('whatsapp-btn');
    if (whatsappLink) {
      waBtn.href = whatsappLink;
      waBtn.style.display = 'flex';
    }
  }

  function resetForm() {
    document.getElementById('form-section').style.display = 'block';
    document.getElementById('success-section').style.display = 'none';
    document.getElementById('musician-select').value = '';
    selectedMusician = null;
    selectedPeriod = '';
    renderTags();
    dateInput.value = todayStr;
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('btn-submit').disabled = true;
    document.getElementById('btn-submit').textContent = 'Confirmar Disponibilidade';
    document.getElementById('error-box').style.display = 'none';
  }

  loadMusicians();
</script>
</body>
</html>
